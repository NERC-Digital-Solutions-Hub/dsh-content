name: Generate Manifests

on:
  workflow_run:
    workflows: ['Build UPRN Service Config']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-manifests:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate manifests
        run: |
          python .github/scripts/generate-manifests.py

      - name: Commit changes on main only
        if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main') || (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') }}
        run: |
          if [[ -n "$(git status --porcelain manifest.*.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add manifest.*.json
            git commit -m "Update manifests"
            git push origin HEAD:main
          else
            echo "No manifest changes to commit."
          fi
