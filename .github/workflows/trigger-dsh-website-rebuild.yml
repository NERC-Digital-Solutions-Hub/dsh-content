name: Trigger DSH Website Rebuild

on:
  workflow_run:
    workflows: ['Generate Manifests']
    types: [completed]
    branches: [main]

jobs:
  trigger:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Trigger dsh website repo build
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_REPO_ACTIONS_TOKEN }}
        run: |
          gh workflow run deploy.yml \
            --repo NERC-Digital-Solutions-Hub/dsh-dev \
            --ref dev
