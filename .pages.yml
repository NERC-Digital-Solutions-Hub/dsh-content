media:
  input: pages/images
  output: pages/images

# Environment-managed content is represented by fixed files so editors can
# choose Production, Development, or Testing directly in the Pages CMS UI.
# The environment is stored only in each filename.

content:
  # ─────────────────────────────────────────────
  # Home
  # ─────────────────────────────────────────────

  - name: home
    label: Home
    type: group
    items:
      - name: home-introduction
        label: Introduction
        type: group
        items:
          - name: home-introduction-production
            label: Production
            type: file
            path: pages/introduction/introduction.production.md
            operations:
              create: true
              rename: false
              delete: false
            fields:
              - name: body
                label: Body
                type: rich-text
                options:
                  format: markdown

          - name: home-introduction-development
            label: Development
            type: file
            path: pages/introduction/introduction.development.md
            operations:
              create: true
              rename: false
              delete: false
            fields:
              - name: body
                label: Body
                type: rich-text
                options:
                  format: markdown

          - name: home-introduction-testing
            label: Testing
            type: file
            path: pages/introduction/introduction.testing.md
            operations:
              create: true
              rename: false
              delete: false
            fields:
              - name: body
                label: Body
                type: rich-text
                options:
                  format: markdown

      - name: home-content
        label: Content
        type: group
        items:
          - name: home-content-production
            label: Production
            type: file
            path: pages/content/content.production.json
            format: json
            operations:
              create: true
              rename: false
              delete: false
            fields:
              - name: title
                label: Title
                type: string
                required: true

              - name: version
                label: Version
                type: string
                required: false

              - name: description
                label: Description
                type: string
                required: false

          - name: home-content-development
            label: Development
            type: file
            path: pages/content/content.development.json
            format: json
            operations:
              create: true
              rename: false
              delete: false
            fields:
              - name: title
                label: Title
                type: string
                required: true

              - name: version
                label: Version
                type: string
                required: false

              - name: description
                label: Description
                type: string
                required: false

          - name: home-content-testing
            label: Testing
            type: file
            path: pages/content/content.testing.json
            format: json
            operations:
              create: true
              rename: false
              delete: false
            fields:
              - name: title
                label: Title
                type: string
                required: true

              - name: version
                label: Version
                type: string
                required: false

              - name: description
                label: Description
                type: string
                required: false

      - name: home-settings
        label: Settings
        type: group
        items:
          - name: home-navigation
            label: Navigation
            type: group
            items:
              - name: home-navigation-production
                label: Production
                type: file
                path: pages/navigation/navigation.production.json
                format: json
                operations:
                  create: true
                  rename: false
                  delete: false
                fields:
                  - name: items
                    label: Navigation Items
                    type: object
                    list: true
                    fields:
                      - name: type
                        label: Type
                        type: string
                        required: true

                      - name: name
                        label: Name
                        type: string
                        required: true

                      - name: href
                        label: Link URL
                        type: string

                      - name: info
                        label: Description
                        type: text

                      - name: children
                        label: Child Links
                        type: object
                        list: true
                        fields:
                          - name: type
                            label: Type
                            type: string
                            required: true

                          - name: name
                            label: Name
                            type: string
                            required: true

                          - name: href
                            label: Link URL
                            type: string
                            required: true

                          - name: info
                            label: Description
                            type: text

              - name: home-navigation-development
                label: Development
                type: file
                path: pages/navigation/navigation.development.json
                format: json
                operations:
                  create: true
                  rename: false
                  delete: false
                fields:
                  - name: items
                    label: Navigation Items
                    type: object
                    list: true
                    fields:
                      - name: type
                        label: Type
                        type: string
                        required: true

                      - name: name
                        label: Name
                        type: string
                        required: true

                      - name: href
                        label: Link URL
                        type: string

                      - name: info
                        label: Description
                        type: text

                      - name: children
                        label: Child Links
                        type: object
                        list: true
                        fields:
                          - name: type
                            label: Type
                            type: string
                            required: true

                          - name: name
                            label: Name
                            type: string
                            required: true

                          - name: href
                            label: Link URL
                            type: string
                            required: true

                          - name: info
                            label: Description
                            type: text

              - name: home-navigation-testing
                label: Testing
                type: file
                path: pages/navigation/navigation.testing.json
                format: json
                operations:
                  create: true
                  rename: false
                  delete: false
                fields:
                  - name: items
                    label: Navigation Items
                    type: object
                    list: true
                    fields:
                      - name: type
                        label: Type
                        type: string
                        required: true

                      - name: name
                        label: Name
                        type: string
                        required: true

                      - name: href
                        label: Link URL
                        type: string

                      - name: info
                        label: Description
                        type: text

                      - name: children
                        label: Child Links
                        type: object
                        list: true
                        fields:
                          - name: type
                            label: Type
                            type: string
                            required: true

                          - name: name
                            label: Name
                            type: string
                            required: true

                          - name: href
                            label: Link URL
                            type: string
                            required: true

                          - name: info
                            label: Description
                            type: text

          - name: home-settings-files
            label: Site Settings
            type: group
            items:
              - name: home-settings-production
                label: Production
                type: file
                path: pages/settings/settings.production.json
                format: json
                operations:
                  create: true
                  rename: false
                  delete: false
                fields:
                  - name: enableIntroductionPopup
                    label: Enable Introduction Popup
                    type: boolean

              - name: home-settings-development
                label: Development
                type: file
                path: pages/settings/settings.development.json
                format: json
                operations:
                  create: true
                  rename: false
                  delete: false
                fields:
                  - name: enableIntroductionPopup
                    label: Enable Introduction Popup
                    type: boolean

              - name: home-settings-testing
                label: Testing
                type: file
                path: pages/settings/settings.testing.json
                format: json
                operations:
                  create: true
                  rename: false
                  delete: false
                fields:
                  - name: enableIntroductionPopup
                    label: Enable Introduction Popup
                    type: boolean

  # ─────────────────────────────────────────────
  # Apps
  # ─────────────────────────────────────────────

  - name: apps
    label: Apps
    type: group
    items:
      - name: apps-cards
        label: App Cards
        type: group
        items:
          - name: apps-cards-production
            label: Production
            type: file
            path: pages/apps/apps.production.json
            format: json
            operations:
              create: true
              rename: false
              delete: false
            fields:
              - name: items
                label: Apps
                type: object
                list: true
                fields:
                  - name: title
                    label: Title
                    type: string
                    required: true

                  - name: description
                    label: Description
                    type: text
                    required: true

                  - name: image
                    label: Image
                    type: image
                    required: false

                  - name: href
                    label: Link URL
                    type: string
                    required: true

          - name: apps-cards-development
            label: Development
            type: file
            path: pages/apps/apps.development.json
            format: json
            operations:
              create: true
              rename: false
              delete: false
            fields:
              - name: items
                label: Apps
                type: object
                list: true
                fields:
                  - name: title
                    label: Title
                    type: string
                    required: true

                  - name: description
                    label: Description
                    type: text
                    required: true

                  - name: image
                    label: Image
                    type: image
                    required: false

                  - name: href
                    label: Link URL
                    type: string
                    required: true

          - name: apps-cards-testing
            label: Testing
            type: file
            path: pages/apps/apps.testing.json
            format: json
            operations:
              create: true
              rename: false
              delete: false
            fields:
              - name: items
                label: Apps
                type: object
                list: true
                fields:
                  - name: title
                    label: Title
                    type: string
                    required: true

                  - name: description
                    label: Description
                    type: text
                    required: true

                  - name: image
                    label: Image
                    type: image
                    required: false

                  - name: href
                    label: Link URL
                    type: string
                    required: true

  # ─────────────────────────────────────────────
  # Research
  # ─────────────────────────────────────────────

  - name: research
    label: Research
    type: group
    items:
      - name: research-page
        label: Research Page
        type: file
        path: pages/research/main.md
        fields:
          - name: body
            label: Body
            type: rich-text
            options:
              format: markdown

      - name: research-articles
        label: Research Articles
        type: collection
        path: pages/research/articles
        filename: "{slug}.md"
        fields:
          - name: title
            label: Title
            type: string
            required: true

          - name: description
            label: Description
            type: text

          - name: thumbnail
            label: Thumbnail
            type: image
            options:
              path: articles
              extensions: [jpg, jpeg, png, webp, gif, svg]
              rename: false

          - name: date
            label: Date
            type: date

          - name: tags
            label: Tags
            type: string
            list: true

          - name: hidden
            label: Hidden
            type: boolean

          - name: body
            label: Body
            type: rich-text
            options:
              format: markdown

  # ─────────────────────────────────────────────
  # UPRN Service
  # ─────────────────────────────────────────────

  - name: uprn-service
    label: UPRN Service
    type: group
    items:
      - name: uprn-service-introduction
        label: Introduction
        type: group
        items:
          - name: uprn-service-introduction-production
            label: Production
            type: file
            path: pages/apps/uprn-service/introduction/introduction.production.md
            operations:
              create: true
              rename: false
              delete: false
            fields:
              - name: body
                label: Body
                type: rich-text
                options:
                  format: markdown

          - name: uprn-service-introduction-development
            label: Development
            type: file
            path: pages/apps/uprn-service/introduction/introduction.development.md
            operations:
              create: true
              rename: false
              delete: false
            fields:
              - name: body
                label: Body
                type: rich-text
                options:
                  format: markdown

          - name: uprn-service-introduction-testing
            label: Testing
            type: file
            path: pages/apps/uprn-service/introduction/introduction.testing.md
            operations:
              create: true
              rename: false
              delete: false
            fields:
              - name: body
                label: Body
                type: rich-text
                options:
                  format: markdown

      - name: uprn-service-settings
        label: Settings
        type: group
        items:
          - name: uprn-service-settings-production
            label: Production
            type: file
            path: pages/apps/uprn-service/settings/settings.production.json
            format: json
            operations:
              create: true
              rename: false
              delete: false
            fields:
              - name: enableIntroductionPopup
                label: Enable Introduction Popup
                type: boolean

              - name: chatbot
                label: Chatbot
                type: object
                fields:
                  - name: initialMessage
                    label: Initial Message
                    type: text

                  - name: exampleQuestions
                    label: Example Questions
                    type: string
                    list: true

          - name: uprn-service-settings-development
            label: Development
            type: file
            path: pages/apps/uprn-service/settings/settings.development.json
            format: json
            operations:
              create: true
              rename: false
              delete: false
            fields:
              - name: enableIntroductionPopup
                label: Enable Introduction Popup
                type: boolean

              - name: chatbot
                label: Chatbot
                type: object
                fields:
                  - name: initialMessage
                    label: Initial Message
                    type: text

                  - name: exampleQuestions
                    label: Example Questions
                    type: string
                    list: true

          - name: uprn-service-settings-testing
            label: Testing
            type: file
            path: pages/apps/uprn-service/settings/settings.testing.json
            format: json
            operations:
              create: true
              rename: false
              delete: false
            fields:
              - name: enableIntroductionPopup
                label: Enable Introduction Popup
                type: boolean

              - name: chatbot
                label: Chatbot
                type: object
                fields:
                  - name: initialMessage
                    label: Initial Message
                    type: text

                  - name: exampleQuestions
                    label: Example Questions
                    type: string
                    list: true