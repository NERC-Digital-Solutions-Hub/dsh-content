media:
  input: pages/images
  output: pages/images

# Environment-managed content is configured as collections so editors can
# create additional environment files through the Pages CMS UI.
#
# The built-in collection entry name is displayed in each environment
# collection so editors can identify the underlying filename without
# opening the entry.

content:
  # ─────────────────────────────────────────────
  # Home
  # ─────────────────────────────────────────────

  - name: home
    label: Home
    type: group
    items:
      - name: home-introduction
        label: Introduction
        type: collection
        path: pages/introduction
        filename:
          template: introduction.production.md
          field: create
        subfolders: false
        operations:
          create: true
          rename: false
          delete: false
        view:
          fields: [name, body]
          primary: name
          sort: [name]
          default:
            sort: name
            order: asc
        fields:
          - name: body
            label: Body
            type: rich-text
            options:
              format: markdown

      - name: home-content
        label: Content
        type: collection
        path: pages/content
        format: json
        filename:
          template: content.production.json
          field: create
        subfolders: false
        operations:
          create: true
          rename: false
          delete: false
        view:
          fields: [name, title, version]
          primary: name
          sort: [name, title, version]
          default:
            sort: name
            order: asc
        fields:
          - name: title
            label: Title
            type: string
            required: true

          - name: version
            label: Version
            type: string
            required: false

          - name: description
            label: Description
            type: string
            required: false

      - name: home-settings
        label: Settings
        type: group
        items:
          - name: home-navigation
            label: Navigation
            type: collection
            path: pages/navigation
            format: json
            filename:
              template: navigation.json
              field: create
            subfolders: false
            operations:
              create: true
              rename: false
              delete: false
            view:
              fields: [name]
              primary: name
              sort: [name]
              default:
                sort: name
                order: asc
            fields:
              - name: items
                label: Navigation Items
                type: object
                list: true
                fields:
                  - name: type
                    label: Type
                    type: string
                    required: true

                  - name: name
                    label: Name
                    type: string
                    required: true

                  - name: href
                    label: Link URL
                    type: string

                  - name: info
                    label: Description
                    type: text

                  - name: children
                    label: Child Links
                    type: object
                    list: true
                    fields:
                      - name: type
                        label: Type
                        type: string
                        required: true

                      - name: name
                        label: Name
                        type: string
                        required: true

                      - name: href
                        label: Link URL
                        type: string
                        required: true

                      - name: info
                        label: Description
                        type: text

          - name: home-settings-files
            label: Site Settings
            type: collection
            path: pages/settings
            format: json
            filename:
              template: settings.json
              field: create
            subfolders: false
            operations:
              create: true
              rename: false
              delete: false
            view:
              fields: [name, enableIntroductionPopup]
              primary: name
              sort: [name]
              default:
                sort: name
                order: asc
            fields:
              - name: enableIntroductionPopup
                label: Enable Introduction Popup
                type: boolean

  # ─────────────────────────────────────────────
  # Apps
  # ─────────────────────────────────────────────

  - name: apps
    label: Apps
    type: group
    items:
      - name: apps-cards
        label: App Cards
        type: collection
        path: pages/apps
        format: json
        filename:
          template: apps.json
          field: create
        subfolders: false
        operations:
          create: true
          rename: false
          delete: false
        view:
          fields: [name]
          primary: name
          sort: [name]
          default:
            sort: name
            order: asc
        fields:
          - name: items
            label: Apps
            type: object
            list: true
            fields:
              - name: title
                label: Title
                type: string
                required: true

              - name: description
                label: Description
                type: text
                required: true

              - name: image
                label: Image
                type: image
                required: false

              - name: href
                label: Link URL
                type: string
                required: true

  # ─────────────────────────────────────────────
  # Research
  # ─────────────────────────────────────────────

  - name: research
    label: Research
    type: group
    items:
      - name: research-page
        label: Research Page
        type: file
        path: pages/research/main.md
        fields:
          - name: body
            label: Body
            type: rich-text
            options:
              format: markdown

      - name: research-articles
        label: Research Articles
        type: collection
        path: pages/research/articles
        filename: "{slug}.md"
        fields:
          - name: title
            label: Title
            type: string
            required: true

          - name: description
            label: Description
            type: text

          - name: thumbnail
            label: Thumbnail
            type: image
            options:
              path: articles
              extensions: [jpg, jpeg, png, webp, gif, svg]
              rename: false

          - name: date
            label: Date
            type: date

          - name: tags
            label: Tags
            type: string
            list: true

          - name: hidden
            label: Hidden
            type: boolean

          - name: body
            label: Body
            type: rich-text
            options:
              format: markdown

  # ─────────────────────────────────────────────
  # UPRN Service
  # ─────────────────────────────────────────────

  - name: uprn-service
    label: UPRN Service
    type: group
    items:
      - name: uprn-service-introduction
        label: Introduction
        type: collection
        path: pages/apps/uprn-service/introduction
        filename:
          template: introduction.{environment}.md
          field: create
        subfolders: false
        operations:
          create: true
          rename: false
          delete: false
        view:
          fields: [name, body]
          primary: name
          sort: [name]
          default:
            sort: name
            order: asc
        fields:
          - name: body
            label: Body
            type: rich-text
            options:
              format: markdown

      - name: uprn-service-settings
        label: Settings
        type: collection
        path: pages/apps/uprn-service/settings
        format: json
        filename:
          template: settings.json
          field: create
        subfolders: false
        operations:
          create: true
          rename: false
          delete: false
        view:
          fields: [name, enableIntroductionPopup]
          primary: name
          sort: [name]
          default:
            sort: name
            order: asc
        fields:
          - name: enableIntroductionPopup
            label: Enable Introduction Popup
            type: boolean

          - name: chatbot
            label: Chatbot
            type: object
            fields:
              - name: initialMessage
                label: Initial Message
                type: text

              - name: exampleQuestions
                label: Example Questions
                type: string
                list: true
